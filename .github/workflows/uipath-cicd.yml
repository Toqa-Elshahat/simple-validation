name: UiPath — Run Tests on Push

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  ORCHESTRATOR_URL:    'https://cloud.uipath.com/'
  ORCHESTRATOR_TENANT: 'DefaultTenant'
  ORCHESTRATOR_ORG:    'toqaectwrkb'
  ORCHESTRATOR_FOLDER: 'Shared'

jobs:

# ============================================================
#  JOB 1 — PACK
# ============================================================
  pack:
    name: '📦 Pack Project'
    runs-on: windows-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Pack Project
        run: |
          uipcli package pack project.json `
            -o "${{ github.workspace }}\packages" `
            --autoVersion
        shell: powershell

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name:           RpaPackage
          path:           ${{ github.workspace }}\packages\*.nupkg
          retention-days: 7

      - name: Debug Secrets
        run: |
          if ("${{ secrets.UIPATH_PAT }}" -eq "") {
            Write-Error "UIPATH_PAT is empty!"
          } else {
            Write-Host "UIPATH_PAT is set ✅"
          }
        shell: powershell

# ============================================================
#  JOB 2 — DEPLOY
# ============================================================
  deploy:
    name: '🚀 Deploy to Orchestrator'
    runs-on: windows-latest
    needs: pack
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: RpaPackage
          path: ${{ github.workspace }}\packages

      - name: Deploy to Orchestrator
        run: |
          $packagePath = (Get-ChildItem "${{ github.workspace }}\packages\*.nupkg" | Select-Object -First 1).FullName
          uipcli package deploy `
            "$packagePath" `
            "${{ env.ORCHESTRATOR_URL }}" `
            "${{ env.ORCHESTRATOR_TENANT }}" `
            --token "${{ secrets.UIPATH_PAT }}" `
            --accountName "${{ env.ORCHESTRATOR_ORG }}" `
            -o "${{ env.ORCHESTRATOR_FOLDER }}" `
            --traceLevel Information
        shell: powershell

# ============================================================
#  JOB 3 — RUN TESTS
# ============================================================
  run-tests:
    name: '🧪 Run Test Cases'
    runs-on: windows-latest
    needs: deploy
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Create results directory
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\results"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\allure-results"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\allure-report"
        shell: powershell

      - name: Run Test Set in Orchestrator
        run: |
          uipcli test run `
            "${{ env.ORCHESTRATOR_URL }}" `
            "${{ env.ORCHESTRATOR_TENANT }}" `
            --token "${{ secrets.UIPATH_PAT }}" `
            --accountName "${{ env.ORCHESTRATOR_ORG }}" `
            -o "${{ env.ORCHESTRATOR_FOLDER }}" `
            -P "project.json" `
            --out junit `
            -r "${{ github.workspace }}\results\results.xml" `
            -w 300 `
            --attachRobotLogs true `
            --traceLevel Verbose `
            --repositoryUrl "https://github.com/Toqa-Elshahat/simple-validation" `
            --repositoryBranch "${{ github.ref_name }}" `
            --repositoryCommit "${{ github.sha }}" `
            --repositoryType git
        shell: powershell

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip" `
            -OutFile "${{ github.workspace }}\allure.zip"
          Expand-Archive `
            -Path "${{ github.workspace }}\allure.zip" `
            -DestinationPath "${{ github.workspace }}\allure-cli"
          echo "${{ github.workspace }}\allure-cli\allure-2.27.0\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Copy results to Allure input
        if: always()
        run: |
          Copy-Item `
            "${{ github.workspace }}\results\results.xml" `
            "${{ github.workspace }}\allure-results\results.xml"
        shell: powershell

      - name: Add Allure environment info
        if: always()
        run: |
          @"
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Orchestrator=${{ env.ORCHESTRATOR_URL }}
          Tenant=${{ env.ORCHESTRATOR_TENANT }}
          Folder=${{ env.ORCHESTRATOR_FOLDER }}
          "@ | Out-File "${{ github.workspace }}\allure-results\environment.properties" -Encoding UTF8
        shell: powershell

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate `
            "${{ github.workspace }}\allure-results" `
            --output "${{ github.workspace }}\allure-report" `
            --clean
        shell: powershell

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: ${{ github.workspace }}\allure-report
          retention-days: 14

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}\results\results.xml
          retention-days: 14

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          'Test Results'
          path:          'results/results.xml'
          reporter:      java-junit
          fail-on-error: false
          token:         ${{ secrets.GITHUB_TOKEN }}
