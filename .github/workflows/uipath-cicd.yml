name: UiPath — Run Tests on Push

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  ORCHESTRATOR_URL:    'https://cloud.uipath.com/'
  ORCHESTRATOR_TENANT: 'DefaultTenant'
  ORCHESTRATOR_ORG:    'toqaectwrkb'
  ORCHESTRATOR_FOLDER: 'Shared'
  ALLURE_VERSION:      '2.27.0'

jobs:

# ============================================================
#  JOB 1 — PACK
# ============================================================
  pack:
    name: '📦 Pack Project'
    runs-on: windows-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Pack Project
        run: |
          uipcli package pack project.json `
            -o "${{ github.workspace }}\packages" `
            --autoVersion
        shell: powershell

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name:           RpaPackage
          path:           ${{ github.workspace }}\packages\*.nupkg
          retention-days: 7

      - name: Debug Secrets
        run: |
          if ("${{ secrets.UIPATH_PAT }}" -eq "") {
            Write-Error "UIPATH_PAT is empty!"
          } else {
            Write-Host "UIPATH_PAT is set ✅"
          }
        shell: powershell

# ============================================================
#  JOB 2 — DEPLOY
# ============================================================
  deploy:
    name: '🚀 Deploy to Orchestrator'
    runs-on: windows-latest
    needs: pack
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: RpaPackage
          path: ${{ github.workspace }}\packages

      - name: Deploy to Orchestrator
        run: |
          $packagePath = (Get-ChildItem "${{ github.workspace }}\packages\*.nupkg" | Select-Object -First 1).FullName
          uipcli package deploy `
            "$packagePath" `
            "${{ env.ORCHESTRATOR_URL }}" `
            "${{ env.ORCHESTRATOR_TENANT }}" `
            --token "${{ secrets.UIPATH_PAT }}" `
            --accountName "${{ env.ORCHESTRATOR_ORG }}" `
            -o "${{ env.ORCHESTRATOR_FOLDER }}" `
            --traceLevel Information
        shell: powershell

# ============================================================
#  JOB 3 — RUN TESTS
# ============================================================
  run-tests:
    name: '🧪 Run Test Cases'
    runs-on: windows-latest
    needs: deploy
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          $allureZip = "${{ github.workspace }}\allure.zip"
          $allureDir = "${{ github.workspace }}\allure-cli"
          Invoke-WebRequest `
            -Uri "https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.zip" `
            -OutFile $allureZip
          Expand-Archive -Path $allureZip -DestinationPath $allureDir -Force
          echo "ALLURE_BIN=$allureDir\allure-${{ env.ALLURE_VERSION }}\bin\allure.bat" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "✅ Allure installed"
        shell: powershell

      - name: Create results directories
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\results"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\allure-results"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\allure-report"
        shell: powershell

      - name: Run Test Set in Orchestrator
        run: |
          uipcli test run `
            "${{ env.ORCHESTRATOR_URL }}" `
            "${{ env.ORCHESTRATOR_TENANT }}" `
            --token "${{ secrets.UIPATH_PAT }}" `
            --accountName "${{ env.ORCHESTRATOR_ORG }}" `
            -o "${{ env.ORCHESTRATOR_FOLDER }}" `
            -P "project.json" `
            --out junit `
            -r "${{ github.workspace }}\results\results.xml" `
            -w 300 `
            --attachRobotLogs true `
            --traceLevel Verbose `
            --repositoryUrl "https://github.com/Toqa-Elshahat/simple-validation" `
            --repositoryBranch "${{ github.ref_name }}" `
            --repositoryCommit "${{ github.sha }}" `
            --repositoryType git
        shell: powershell

      - name: Convert JUnit XML to Allure JSON format
        if: always()
        run: |
          # Install Python converter
          pip install junit2allure --quiet

          # Convert JUnit XML to Allure JSON
          python -c "
          import xml.etree.ElementTree as ET
          import json, os, uuid, time

          tree = ET.parse(r'${{ github.workspace }}\results\results.xml')
          root = tree.getroot()

          output_dir = r'${{ github.workspace }}\allure-results'
          os.makedirs(output_dir, exist_ok=True)

          for suite in root.iter('testsuite'):
              suite_name = suite.get('name', 'Unknown Suite')
              for tc in suite.iter('testcase'):
                  test_name = tc.get('name', 'Unknown Test')
                  duration  = float(tc.get('time', 0)) * 1000
                  failure   = tc.find('failure')
                  sysout    = tc.find('system-out')

                  status = 'failed' if failure is not None else 'passed'

                  result = {
                      'uuid': str(uuid.uuid4()),
                      'name': test_name,
                      'status': status,
                      'stage': 'finished',
                      'start': int(time.time() * 1000) - int(duration),
                      'stop': int(time.time() * 1000),
                      'fullName': suite_name + '.' + test_name,
                      'labels': [
                          {'name': 'suite',     'value': suite_name},
                          {'name': 'framework', 'value': 'UiPath'},
                          {'name': 'language',  'value': 'VisualBasic'},
                          {'name': 'branch',    'value': '${{ github.ref_name }}'},
                          {'name': 'commit',    'value': '${{ github.sha }}'}
                      ],
                      'steps': []
                  }

                  if failure is not None:
                      result['statusDetails'] = {
                          'message': failure.get('message', 'Test failed'),
                          'trace':   failure.text or ''
                      }

                  if sysout is not None and sysout.text:
                      for line in sysout.text.strip().split('\n'):
                          line = line.strip()
                          if line:
                              level = 'failed' if 'error' in line.lower() else 'passed'
                              result['steps'].append({
                                  'name':   line,
                                  'status': level,
                                  'stage':  'finished'
                              })

                  fname = os.path.join(output_dir, str(uuid.uuid4()) + '-result.json')
                  with open(fname, 'w') as f:
                      json.dump(result, f, indent=2)

          print('Conversion complete')
          "

          Write-Host "✅ JUnit XML converted to Allure format"
        shell: powershell

      - name: Add Allure environment info
        if: always()
        run: |
          @"
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Orchestrator=${{ env.ORCHESTRATOR_URL }}
          Tenant=${{ env.ORCHESTRATOR_TENANT }}
          Folder=${{ env.ORCHESTRATOR_FOLDER }}
          "@ | Out-File "${{ github.workspace }}\allure-results\environment.properties" -Encoding UTF8
        shell: powershell

      - name: Generate Allure Report
        if: always()
        run: |
          & "${{ env.ALLURE_BIN }}" generate `
            "${{ github.workspace }}\allure-results" `
            --output "${{ github.workspace }}\allure-report" `
            --clean
          Write-Host "✅ Allure report generated"
        shell: powershell

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: ${{ github.workspace }}\allure-report
          retention-days: 14

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}\results\results.xml
          retention-days: 14

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          'Test Results'
          path:          'results/results.xml'
          reporter:      java-junit
          fail-on-error: false
          token:         ${{ secrets.GITHUB_TOKEN }}
